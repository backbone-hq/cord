name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME}"
          root_ver=$(awk -F'"' '/^version = "/ { print $2; exit }' Cargo.toml)
          derive_ver=$(awk -F'"' '/^version = "/ { print $2; exit }' cord-derive/Cargo.toml)
          if [[ "$tag" != "v$root_ver" ]]; then
            echo "tag $tag does not match cord version v$root_ver" >&2; exit 1
          fi
          if [[ "$root_ver" != "$derive_ver" ]]; then
            echo "cord ($root_ver) and cord-derive ($derive_ver) versions disagree" >&2; exit 1
          fi

      - name: Run tests
        run: cargo test --all-features --verbose

      - name: Publish cord-derive
        working-directory: cord-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Wait for crates.io to index cord-derive
        run: sleep 30

      - name: Publish cord
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
