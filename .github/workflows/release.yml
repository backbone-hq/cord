name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release to crates.io
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME}"
          root_ver=$(awk -F'"' '/^version = "/ { print $2; exit }' Cargo.toml)
          derive_ver=$(
            awk -F'"' '/^version = "/ { print $2; exit }' cord-derive/Cargo.toml
          )
          if [[ "$tag" != "v$root_ver" ]]; then
            echo "tag $tag != cord v$root_ver" >&2; exit 1
          fi
          if [[ "$root_ver" != "$derive_ver" ]]; then
            echo "mismatch: cord=$root_ver derive=$derive_ver" >&2; exit 1
          fi

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Check semver compatibility
        run: cargo semver-checks

      - name: Run tests
        run: cargo test --workspace --all-features --verbose

      - name: Get crates.io token
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish cord-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p cord-derive

      - name: Wait for crates.io to index cord-derive
        run: sleep 30

      - name: Publish cord
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p cord
