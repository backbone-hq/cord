             L 140 100 A 16 16 0 0 0 156 84
             L 156 60 A 16 16 0 0 1 172 44
             L 196 44 A 16 16 0 0 1 212 60
             L 212 140 A 16 16 0 0 1 196 156
             L 172 156 A 16 16 0 0 0 156 172
             L 156 196 A 16 16 0 0 0 172 212
             L 212 212"
          fill="none"
          stroke="#FFFFFF"
